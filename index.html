<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betta Cam - Reset Password</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #02050A; 
      color: #ffffff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
    .card { background-color: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px; border: 1px solid rgba(0, 168, 232, 0.2); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
    h1 { font-size: 24px; margin: 0 0 8px 0; letter-spacing: 2px; }
    h2 { font-size: 16px; color: #00A8E8; font-weight: 400; margin: 0 0 8px 0; }
    .subtitle { color: rgba(255, 255, 255, 0.5); font-size: 14px; margin-bottom: 32px; }
    
    .input-group { 
      margin-bottom: 16px; 
      position: relative; 
    }
    
    input { 
      width: 100%; 
      padding: 16px 50px 16px 16px; 
      background-color: rgba(255, 255, 255, 0.05); 
      border: none; 
      border-radius: 12px; 
      color: #ffffff; 
      font-size: 16px; 
      box-sizing: border-box; 
      outline: none; 
      transition: all 0.3s ease; 
    }
    input:focus { background-color: rgba(255, 255, 255, 0.1); border: 1px solid #00A8E8; }
    
    .main-btn { width: 100%; padding: 16px; margin-top: 16px; background-color: #00A8E8; color: #ffffff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
    .main-btn:hover { background-color: #0090C8; transform: translateY(-2px); }
    .main-btn:disabled { background-color: #333333; color: #888888; cursor: not-allowed; }
    
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 10px; /* 🌟 Added padding to make the touch target larger for fingers */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
      -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile tap */
    }
    .toggle-password:hover {
      color: #ffffff;
    }
    .toggle-password svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      pointer-events: none; /* 🌟 THE FIX: Stops the SVG from blocking the button click */
    }

    .message { margin-top: 24px; padding: 12px; border-radius: 8px; font-size: 14px; }
    .message.success { background-color: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); }
    .message.error { background-color: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>BETTA CAM</h1>
      <h2>Secure Password Reset</h2>
      <p class="subtitle">Please enter your new password below.</p>

      <div id="reset-form">
        <div class="input-group">
          <input type="password" id="new-password" placeholder="New Password" required minlength="6">
          <button type="button" class="toggle-password" onclick="toggleVisibility('new-password', 'eye-icon-1')">
            <svg id="eye-icon-1" viewBox="0 0 24 24">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>

        <div class="input-group">
          <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
          <button type="button" class="toggle-password" onclick="toggleVisibility('confirm-password', 'eye-icon-2')">
            <svg id="eye-icon-2" viewBox="0 0 24 24">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
        
        <button id="submit-btn" class="main-btn" onclick="updatePassword()">Save New Password</button>
      </div>

      <div id="status-message" class="message hidden"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gtuzykimdtholeextfdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dXp5a2ltZHRob2xlZXh0ZmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI5ODIsImV4cCI6MjA5MjA1ODk4Mn0.fIg05zP6I5hIxFFCEJu-ztOhVTHVNnBHhlBJo3AV6Q4';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');

    const svgEyeOpen = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    const svgEyeClosed = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';

    // 🌟 THE FIX: Using setAttribute makes it forcefully update the UI on all mobile browsers
    function toggleVisibility(inputId, iconId) {
      const inputField = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      
      if (inputField.getAttribute("type") === "password") {
        inputField.setAttribute("type", "text");
        icon.innerHTML = svgEyeOpen; 
      } else {
        inputField.setAttribute("type", "password");
        icon.innerHTML = svgEyeClosed; 
      }
    }

    function showMessage(text, isError = false) {
      statusMessage.textContent = text;
      statusMessage.className = `message ${isError ? 'error' : 'success'}`;
      statusMessage.style.display = 'block';
    }

    window.onload = function() {
      if (!window.location.hash.includes("access_token")) {
        showMessage("Security token missing. Please request a new password reset link from the app.", true);
        submitBtn.disabled = true;
      }
    };

    async function updatePassword() {
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (newPassword.length < 6) {
        showMessage("Password must be at least 6 characters.", true);
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match.", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating Password...';
      statusMessage.style.display = 'none';

      try {
        const { data, error } = await supabase.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        showMessage("Password updated successfully! You can now log into the Betta Cam app.", false);
        newPasswordInput.value = '';
        confirmPasswordInput.value = '';
        
        // Hide the inputs so it looks cleaner after success
        document.getElementById('new-password').parentElement.style.display = 'none';
        document.getElementById('confirm-password').parentElement.style.display = 'none';
        submitBtn.style.display = 'none';

      } catch (error) {
        showMessage(error.message || "An error occurred.", true);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save New Password';
      }
    }
  </script>
</body>
</html>
