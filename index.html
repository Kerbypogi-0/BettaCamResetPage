<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betta Cam - Reset Password</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #02050A; 
      color: #ffffff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
    .card { background-color: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px; border: 1px solid rgba(0, 168, 232, 0.2); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
    h1 { font-size: 24px; margin: 0 0 8px 0; letter-spacing: 2px; }
    h2 { font-size: 16px; color: #00A8E8; font-weight: 400; margin: 0 0 8px 0; }
    .subtitle { color: rgba(255, 255, 255, 0.5); font-size: 14px; margin-bottom: 32px; }
    
    .input-group { 
      margin-bottom: 16px; 
      position: relative; 
      display: flex;
      align-items: center;
    }
    
    input { 
      width: 100%; 
      padding: 16px 70px 16px 16px; 
      background-color: rgba(255, 255, 255, 0.05); 
      border: none; 
      border-radius: 12px; 
      color: #ffffff; 
      font-size: 16px; 
      box-sizing: border-box; 
      outline: none; 
      transition: border 0.3s ease; 
    }
    input:focus { border: 1px solid #00A8E8; }
    
    .toggle-btn {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: #00A8E8;
      font-weight: bold;
      font-size: 14px;
      padding: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }

    .main-btn { width: 100%; padding: 16px; margin-top: 16px; background-color: #00A8E8; color: #ffffff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .main-btn:disabled { background-color: #333333; color: #888888; cursor: not-allowed; }

    .message { margin-top: 24px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .message.success { background-color: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); }
    .message.error { background-color: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>BETTA CAM</h1>
      <h2>Secure Password Reset</h2>
      <p class="subtitle">Please enter your new password below.</p>

      <form id="password-form">
        <div class="input-group">
          <input type="password" id="pass1" placeholder="New Password" required minlength="6">
          <button type="button" class="toggle-btn" id="toggle-btn-1">SHOW</button>
        </div>

        <div class="input-group">
          <input type="password" id="pass2" placeholder="Confirm Password" required minlength="6">
          <button type="button" class="toggle-btn" id="toggle-btn-2">SHOW</button>
        </div>
        
        <button type="submit" id="submit-btn" class="main-btn">Save New Password</button>
      </form>

      <div id="status-box" class="message"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gtuzykimdtholeextfdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dXp5a2ltZHRob2xlZXh0ZmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODI5ODIsImV4cCI6MjA5MjA1ODk4Mn0.fIg05zP6I5hIxFFCEJu-ztOhVTHVNnBHhlBJo3AV6Q4';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle Logic
    const btn1 = document.getElementById('toggle-btn-1');
    const input1 = document.getElementById('pass1');
    btn1.addEventListener('click', function() {
      input1.type = input1.type === 'password' ? 'text' : 'password';
      btn1.textContent = input1.type === 'password' ? 'SHOW' : 'HIDE';
    });

    const btn2 = document.getElementById('toggle-btn-2');
    const input2 = document.getElementById('pass2');
    btn2.addEventListener('click', function() {
      input2.type = input2.type === 'password' ? 'text' : 'password';
      btn2.textContent = input2.type === 'password' ? 'SHOW' : 'HIDE';
    });

    const statusBox = document.getElementById('status-box');
    const submitBtn = document.getElementById('submit-btn');

    function showFeedback(message, isError) {
      statusBox.textContent = message;
      statusBox.className = isError ? 'message error' : 'message success';
      statusBox.style.display = 'block';
    }

    // Form Submission Logic
    document.getElementById('password-form').addEventListener('submit', async function(event) {
      event.preventDefault(); 

      const p1 = input1.value;
      const p2 = input2.value;

      if (p1 !== p2) {
        showFeedback("Passwords do not match.", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Updating...";

      try {
        // Attempt 1: Check for hash tokens (standard flow)
        const hashString = window.location.hash.replace('#', '');
        const hashParams = new URLSearchParams(hashString);
        const accessToken = hashParams.get('access_token');
        
        // Attempt 2: Check for modern Supabase token_hash format in standard URL params
        const searchParams = new URLSearchParams(window.location.search);
        const tokenHash = searchParams.get('token_hash');
        const type = searchParams.get('type');

        if (accessToken) {
          await sbClient.auth.setSession({ access_token: accessToken, refresh_token: hashParams.get('refresh_token') });
        } else if (tokenHash && type === 'recovery') {
          await sbClient.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
        }

        // Now update the password
        const { error: updateError } = await sbClient.auth.updateUser({
          password: p1
        });

        if (updateError) throw updateError;

        showFeedback("Success! Password updated. You can now log into the app.", false);
        document.getElementById('password-form').style.display = 'none';

      } catch (error) {
        console.error("Supabase Error:", error); 
        showFeedback(error.message || "Auth session missing. Please request a new link.", true);
        submitBtn.disabled = false;
        submitBtn.textContent = "Save New Password";
      }
    });
  </script>
</body>
</html>
